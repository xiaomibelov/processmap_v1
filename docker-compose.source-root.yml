services:
  api:
    build:
      context: ${FPC_SOURCE_ROOT:?FPC_SOURCE_ROOT must point to the runtime source root}
    volumes:
      - ${FPC_SOURCE_ROOT:?FPC_SOURCE_ROOT must point to the runtime source root}/workspace:/app/workspace
      - ${FPC_SOURCE_ROOT:?FPC_SOURCE_ROOT must point to the runtime source root}/backend:/app/backend

  frontend:
    build:
      context: ${FPC_SOURCE_ROOT:?FPC_SOURCE_ROOT must point to the runtime source root}/frontend
      dockerfile: Dockerfile
    volumes:
      - ${FPC_SOURCE_ROOT:?FPC_SOURCE_ROOT must point to the runtime source root}/frontend:/app

  gateway:
    volumes:
      - ${FPC_SOURCE_ROOT:?FPC_SOURCE_ROOT must point to the runtime source root}/deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
