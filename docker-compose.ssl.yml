services:
  gateway:
    ports:
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.prod.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_DIR:-/opt/processmap/certbot-www}:/var/www/certbot:ro
