services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - FPC_DB_BACKEND=${FPC_DB_BACKEND:?FPC_DB_BACKEND is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - FPC_DB_POOL_MIN_SIZE=${FPC_DB_POOL_MIN_SIZE:-1}
      - FPC_DB_POOL_MAX_SIZE=${FPC_DB_POOL_MAX_SIZE:-8}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - REDIS_REQUIRED=${REDIS_REQUIRED:-1}
    ports:
      - "${HOST_PORT:?HOST_PORT is required}:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_HMR_PORT=5177
      - VITE_PORT=5177
    command: sh -c "if [ ! -f node_modules/tailwindcss/package.json ]; then npm ci --include=dev; fi && npm run dev -- --host 0.0.0.0 --port 5177"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  frontend_node_modules:
  postgres_data:
