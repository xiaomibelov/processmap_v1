services:
  edge:
    image: nginx:1.27-alpine
    ports:
      - "${EDGE_HTTP_PORT:?EDGE_HTTP_PORT is required}:80"
      - "${EDGE_HTTPS_PORT:?EDGE_HTTPS_PORT is required}:443"
    volumes:
      - ./runtime/edge/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${LETSENCRYPT_DIR:?LETSENCRYPT_DIR is required}:/etc/letsencrypt
      - ${ACME_WEBROOT_DIR:?ACME_WEBROOT_DIR is required}:/var/www/certbot
    networks:
      - edge_shared
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles:
      - ops
    entrypoint: /bin/sh
    command: -c "trap exit TERM INT; while :; do certbot renew --webroot -w /var/www/certbot --non-interactive --quiet; sleep 12h; done"
    volumes:
      - ${LETSENCRYPT_DIR:?LETSENCRYPT_DIR is required}:/etc/letsencrypt
      - ${ACME_WEBROOT_DIR:?ACME_WEBROOT_DIR is required}:/var/www/certbot
    restart: unless-stopped

networks:
  edge_shared:
    name: ${EDGE_NETWORK_NAME:?EDGE_NETWORK_NAME is required}
    external: true
