services:
  api:
    env_file:
      - .env.stage
    ports: !override []
    volumes:
      - ./runtime/stage/workspace:/app/workspace

  redis:
    ports: !override []

  postgres:
    ports: !override []
    volumes:
      - ./runtime/stage/postgres:/var/lib/postgresql/data

  frontend:
    # Publish the stage frontend directly on the legacy stand port so that
    # http://clearvestnic.ru:5177 serves the same build as https://stage.processmap.ru.
    ports: !override
      - "${FRONTEND_PORT:-5177}:5177"
    networks:
      default:
      edge_shared:
        aliases:
          - stage-gateway

networks:
  edge_shared:
    name: ${EDGE_NETWORK_NAME:?EDGE_NETWORK_NAME is required}
    external: true
