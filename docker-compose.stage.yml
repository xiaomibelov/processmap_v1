services:
  api:
    ports: !override []
    volumes:
      - ./runtime/stage/workspace:/app/workspace

  redis:
    ports: !override []

  postgres:
    ports: !override []
    volumes:
      - ./runtime/stage/postgres:/var/lib/postgresql/data

  gateway:
    ports: !override []
    networks:
      default:
      edge_shared:
        aliases:
          - stage-gateway

networks:
  edge_shared:
    name: ${EDGE_NETWORK_NAME:?EDGE_NETWORK_NAME is required}
    external: true
