name: Deploy to Stage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to stage server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/processmap/app

            # Pull latest code — only update tracked source files, keep server configs intact
            git remote set-url origin git@github.com:xiaomibelov/processmap_v1.git
            git fetch origin main
            git checkout origin/main -- backend frontend Dockerfile

            # Rebuild and restart stage containers
            APP_ENV_FILE=.env.stage docker compose \
              --env-file .env.stage \
              -f docker-compose.yml \
              -f docker-compose.stage.yml \
              -p processmap_stage \
              build api

            APP_ENV_FILE=.env.stage docker compose \
              --env-file .env.stage \
              -f docker-compose.yml \
              -f docker-compose.stage.yml \
              -p processmap_stage \
              up -d --no-deps api

            echo "[deploy-stage] done"
