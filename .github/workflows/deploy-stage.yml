name: Deploy to Stage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to stage server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/processmap/app

            REQUESTED_REF="main"
            FRESHNESS_SOURCE_FILE="frontend/.stage-deploy-fingerprint.json"
            cleanup_freshness_source() {
              rm -f "${FRESHNESS_SOURCE_FILE}"
            }
            trap cleanup_freshness_source EXIT

            echo "[deploy-stage] requested ref: ${REQUESTED_REF}"

            # Pull latest source code only, preserve server configs
            git remote set-url origin git@github.com:xiaomibelov/processmap_v1.git
            git fetch origin main
            DEPLOY_SHA="$(git rev-parse --verify origin/main)"
            echo "[deploy-stage] resolved sha: ${DEPLOY_SHA}"
            git checkout "${DEPLOY_SHA}" -- backend frontend Dockerfile deploy docker-compose.yml docker-compose.stage.yml

            deploy/scripts/stage_freshness_proof.sh prepare-source \
              --requested-ref "${REQUESTED_REF}" \
              --resolved-sha "${DEPLOY_SHA}"

            # Rebuild api and gateway (frontend is baked into gateway image)
            APP_ENV_FILE=.env.stage docker compose \
              --env-file .env.stage \
              -f docker-compose.yml \
              -f docker-compose.stage.yml \
              -p processmap_stage \
              build --no-cache api gateway

            # Diagnostics: show current gateway mounts/assets before recreate
            echo "[deploy-stage] current gateway mounts:"
            docker inspect processmap_stage-gateway-1 --format='{{json .Mounts}}' 2>/dev/null || true
            echo "[deploy-stage] current gateway assets:"
            docker exec processmap_stage-gateway-1 sh -c 'ls -la /usr/share/nginx/html/assets/index-*.js 2>/dev/null || true' 2>/dev/null || true

            # Remove the old gateway container and any attached volumes so stale statics cannot survive
            docker compose -p processmap_stage rm -fsv gateway 2>/dev/null || true
            # Drop any project named volume that could be masking /usr/share/nginx/html
            docker volume ls -q | grep '^processmap_stage_gateway' | xargs -r docker volume rm 2>/dev/null || true

            # Start fresh containers (renew anonymous volumes to pull files from the new image)
            APP_ENV_FILE=.env.stage docker compose \
              --env-file .env.stage \
              -f docker-compose.yml \
              -f docker-compose.stage.yml \
              -p processmap_stage \
              up -d --no-deps --force-recreate -V api gateway

            # Diagnostics after recreate
            echo "[deploy-stage] new gateway mounts:"
            docker inspect processmap_stage-gateway-1 --format='{{json .Mounts}}' 2>/dev/null || true
            echo "[deploy-stage] new gateway assets:"
            docker exec processmap_stage-gateway-1 sh -c 'ls -la /usr/share/nginx/html/assets/index-*.js 2>/dev/null || true' 2>/dev/null || true

            deploy/scripts/stage_freshness_proof.sh verify-chain \
              --requested-ref "${REQUESTED_REF}" \
              --resolved-sha "${DEPLOY_SHA}"

            echo "[deploy-stage] done ref=${REQUESTED_REF} sha=${DEPLOY_SHA}"
