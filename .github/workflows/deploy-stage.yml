name: Deploy to Stage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to stage server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/processmap/app

            REQUESTED_REF="main"
            FRESHNESS_SOURCE_FILE="frontend/.stage-deploy-fingerprint.json"
            cleanup_freshness_source() {
              rm -f "${FRESHNESS_SOURCE_FILE}"
            }
            trap cleanup_freshness_source EXIT

            echo "[deploy-stage] requested ref: ${REQUESTED_REF}"

            # Pull latest source code only, preserve server configs
            git remote set-url origin git@github.com:xiaomibelov/processmap_v1.git
            git fetch origin main
            DEPLOY_SHA="$(git rev-parse --verify origin/main)"
            echo "[deploy-stage] resolved sha: ${DEPLOY_SHA}"
            git checkout "${DEPLOY_SHA}" -- backend frontend Dockerfile deploy docker-compose.yml

            deploy/scripts/stage_freshness_proof.sh prepare-source \
              --requested-ref "${REQUESTED_REF}" \
              --resolved-sha "${DEPLOY_SHA}"

            # Rebuild api and gateway (frontend is baked into gateway image)
            APP_ENV_FILE=.env.stage docker compose \
              --env-file .env.stage \
              -f docker-compose.yml \
              -f docker-compose.stage.yml \
              -p processmap_stage \
              build api gateway

            # Restart updated containers
            APP_ENV_FILE=.env.stage docker compose \
              --env-file .env.stage \
              -f docker-compose.yml \
              -f docker-compose.stage.yml \
              -p processmap_stage \
              up -d --no-deps api gateway

            deploy/scripts/stage_freshness_proof.sh verify-chain \
              --requested-ref "${REQUESTED_REF}" \
              --resolved-sha "${DEPLOY_SHA}"

            echo "[deploy-stage] done ref=${REQUESTED_REF} sha=${DEPLOY_SHA}"
