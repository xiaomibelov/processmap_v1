name: Deploy to Prod

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to prod server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/processmap/app

            # Pull latest source code only, preserve server configs
            git remote set-url origin git@github.com:xiaomibelov/processmap_v1.git
            git fetch origin main
            git checkout origin/main -- backend frontend Dockerfile deploy \
              docker-compose.yml docker-compose.prod.yml docker-compose.prod.gateway.yml \
              docker-compose.ssl.yml Dockerfile.gateway.prod

            # Resolve git metadata from origin/main (HEAD may be on a different branch)
            GIT_SHA=$(git rev-parse origin/main)
            GIT_REF="main"
            BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            DEPLOY_FINGERPRINT="processmap-prod-deploy-sha:${GIT_SHA}"

            # Persist build metadata in the prod env file so the API /version endpoint
            # reports the deployed SHA instead of whatever the local repo HEAD was.
            ENV_FILE="/opt/processmap/env/prod.env"
            sed -i '/^BUILD_ID=/d; /^BUILD_TIME=/d; /^BUILD_BRANCH=/d; /^BUILD_ENV=/d' "${ENV_FILE}" 2>/dev/null || true
            {
              echo ""
              echo "# Auto-injected by deploy-prod.yml at ${BUILD_TIME}"
              echo "BUILD_ID=${GIT_SHA}"
              echo "BUILD_TIME=${BUILD_TIME}"
              echo "BUILD_BRANCH=${GIT_REF}"
              echo "BUILD_ENV=prod"
            } >> "${ENV_FILE}"

            # Save current images as rollback point before rebuilding
            docker tag processmap-gateway:dev processmap-gateway:rollback 2>/dev/null || true
            docker tag app-api:latest app-api:rollback 2>/dev/null || true

            # Rebuild api (cached)
            APP_ENV_FILE=/opt/processmap/env/prod.env docker compose \
              --env-file /opt/processmap/env/prod.env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.ssl.yml \
              -f docker-compose.prod.gateway.yml \
              -p app \
              build \
                --build-arg BUILD_ID="${GIT_SHA}" \
                --build-arg BUILD_TIME="${BUILD_TIME}" \
                --build-arg BUILD_BRANCH="${GIT_REF}" \
                --build-arg BUILD_ENV=prod \
                api

            # Rebuild gateway without cache so fresh frontend statics + fingerprint are baked in
            APP_ENV_FILE=/opt/processmap/env/prod.env docker compose \
              --env-file /opt/processmap/env/prod.env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.ssl.yml \
              -f docker-compose.prod.gateway.yml \
              -p app \
              build --no-cache \
                --build-arg VITE_BUILD_ID="${GIT_SHA}" \
                --build-arg VITE_BUILD_BRANCH="${GIT_REF}" \
                --build-arg VITE_BUILD_TIME="${BUILD_TIME}" \
                --build-arg VITE_DEPLOY_FINGERPRINT="${DEPLOY_FINGERPRINT}" \
                --build-arg VITE_DEPLOY_REQUESTED_REF="${GIT_REF}" \
                --build-arg VITE_DEPLOY_RESOLVED_SHA="${GIT_SHA}" \
                gateway

            # Remove the old gateway container and any attached volumes so stale statics cannot survive
            docker compose \
              --env-file /opt/processmap/env/prod.env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.ssl.yml \
              -f docker-compose.prod.gateway.yml \
              -p app \
              rm -fsv gateway frontend 2>/dev/null || true
            # Drop any project named volume that could mask /usr/share/nginx/html
            docker volume ls -q | grep '^app_' | xargs -r docker volume rm 2>/dev/null || true

            # Start fresh containers (renew anonymous volumes to pull files from the new image)
            APP_ENV_FILE=/opt/processmap/env/prod.env docker compose \
              --env-file /opt/processmap/env/prod.env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.ssl.yml \
              -f docker-compose.prod.gateway.yml \
              -p app \
              up -d --no-deps --force-recreate -V api gateway

            # Post-deploy freshness proof
            echo "[deploy-prod] waiting for prod gateway to come up..."
            sleep 15
            echo "=== Prod /version ==="
            VERSION_RESPONSE=$(curl -fsS https://processmap.ru/version || echo "ERROR")
            echo "${VERSION_RESPONSE}" | head -c 500
            echo
            if echo "${VERSION_RESPONSE}" | grep -q "\"commit\":\"${GIT_SHA}\""; then
              echo "OK: /version commit matches ${GIT_SHA}"
            else
              echo "ERROR: /version commit does not match ${GIT_SHA}"
              exit 1
            fi

            echo "=== Prod /api/health ==="
            curl -fsS https://processmap.ru/api/health || echo "ERROR: /api/health unreachable"
            echo

            echo "=== Prod frontend fingerprint ==="
            MAIN_JS=$(curl -fsS https://processmap.ru/ | grep -oE 'assets/index-[A-Za-z0-9]+\.js' | head -1)
            if [ -n "${MAIN_JS}" ]; then
              FINGERPRINT=$(curl -fsS "https://processmap.ru/${MAIN_JS}" \
                | grep -oE "processmap-prod-deploy-sha:[a-f0-9]+" \
                | head -1)
              echo "${FINGERPRINT}"
              if echo "${FINGERPRINT}" | grep -q "${GIT_SHA}"; then
                echo "OK: frontend fingerprint matches ${GIT_SHA}"
              else
                echo "ERROR: frontend fingerprint does not match ${GIT_SHA}"
                exit 1
              fi
            else
              echo "ERROR: could not locate main JS asset"
              exit 1
            fi

            echo "[deploy-prod] done"
