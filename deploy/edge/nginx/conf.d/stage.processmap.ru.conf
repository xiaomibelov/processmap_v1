server {
    listen 80;
    server_name stage.processmap.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://stage.processmap.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name stage.processmap.ru;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $stage_gateway stage-gateway;

    ssl_certificate /etc/letsencrypt/live/stage.processmap.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.processmap.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://$stage_gateway:80;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
