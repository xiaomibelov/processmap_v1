name: bpmn123-local

services:
  bpmn123-frontend:
    container_name: bpmn123-frontend-local
    build:
      context: ./frontend
      dockerfile: Dockerfile.bpmn123.local
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_PROXY_TARGET=${BPMN123_API_PROXY_TARGET:-http://host.docker.internal:8087}
      - VITE_ALLOWED_HOSTS=${BPMN123_VITE_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - VITE_HMR_PORT=${BPMN123_VITE_HMR_PORT:-5177}
      - VITE_PORT=${BPMN123_VITE_PORT:-5177}
    command: >
      sh -c "if [ ! -f node_modules/tailwindcss/package.json ]; then npm install --include=dev --package-lock=false; fi
      && npm run dev -- --host 0.0.0.0 --port ${BPMN123_VITE_PORT:-5177}"
    ports:
      - "${BPMN123_FRONTEND_PORT:-5177}:${BPMN123_VITE_PORT:-5177}"
    volumes:
      - ./frontend:/app
      - bpmn123_frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:${BPMN123_VITE_PORT:-5177}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  bpmn123_frontend_node_modules:
